<style>

  /* --- YENİ EKLENEN EV BUTONU STİLİ --- */

/* Basit, temiz stil */

  --bg:#0f172a;--card:#1e293b;--panel:#334155;--text:#f1f5f9;

body{font-family:Inter,Segoe UI,system-ui,Arial;background:var(--bg);color:var(--text);padding:18px;min-height:100vh}
.container{max-width:1200px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding:18px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#10b981);box-shadow:0 18px 40px var(--shadow);margin-bottom:18px}

<body>
  <a href="https://ovarthy-bot.github.io/navigasyon/" class="home-btn" title="Ana Sayfaya Git">🏠</a>
<div class="container" id="container">
  <header>
    <h1>✈️ Adam Saat Dağıtma Uygulaması – v19.3</h1>
    <div class="small"> |Geliştirici: ovar@thy.com| </div>
  </header>

  <div class="grid">
    <div class="card">
      <h2>📋 İşler</h2>
      <div id="tasks"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-add" id="addTask">+ İş Ekle</button>
        <button class="btn" id="resetTasks" style="background:#111;border:1px solid var(--border);color:var(--muted)">Reset</button>
      </div>
      <div id="tasksStat" class="stat"></div>
    </div>

    <div class="card">
      <h2>👷 Teknisyenler & Vardiya</h2>
      <div id="techs"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-add" id="addTech">+ Teknisyen Ekle</button>
        <button class="btn" id="resetTechs" style="background:#111;border:1px solid var(--border);color:var(--muted)">Reset</button>
      </div>
      
      <div id="techsStat" class="stat"></div>

      <div style="margin-top:10px" class="small">
        <div class="input-group"><label style="width:110px">Vardiya Başlangıç</label><input type="time" id="shiftStart"></div>
        <div class="input-group"><label style="width:110px">Vardiya Bitiş</label><input type="time" id="shiftEnd"></div>
        <div class="input-group"><label style="width:110px">Yemek Molası</label>
          <input type="time" id="breakStart"><input type="time" id="breakEnd">
          <button class="btn" id="clearBreak" style="background:#111;color:var(--muted);border:1px solid var(--border)">Temizle</button>
        </div>
        <div class="input-group"><label style="width:110px">B1 Teknisyen</label><input type="text" id="headTech" placeholder="B1 Teknisyen"></div>
         
        <hr style="border-color:var(--border);margin:12px 0;">
        <label style="color:var(--muted)">B1 Teknisyen Dolu Saatleri (Opsiyonel)</label>
        <div id="headBlocks" style="margin-top:8px;"></div>
        <button class="btn btn-add" id="addHeadBlock" style="padding:8px 12px;font-size:0.9rem;">+ Dolu Saat Ekle</button>
      </div>
    </div>
  </div>

  <div id="results"></div>
  
  <div class="card" style="grid-column: 1 / -1;">
    <button class="btn-plan" id="planBtn">🚀 İş Planını Oluştur (v19.3)</button>
  </div>
</div>
  
<script>
const $ = id => document.getElementById(id);
const t2m = t => { if(!t) return null; const [h,m] = t.split(':').map(Number); return h*60+m; };
const m2t = m => { m = Math.round(m); if(m < 0) m = 0; const hh = Math.floor(m/60)%24; const mm = m%60; return String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0'); };
const ceil15 = m => Math.max(15, Math.ceil(m/15)*15);
const minutesToHoursStr = m => (m/60).toFixed(2);

const load = (k,d)=>{ try{ return JSON.parse(localStorage.getItem(k)) ?? d } catch(e){ return d } };
const save = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

let tasks = load('asdp_tasks', [{ name:'İş 1', hours:5.0 },{ name:'İş 2', hours:2.0 }]);
let technicians = load('asdp_techs', ['Teknisyen 1','Teknisyen 2','Teknisyen 3']);
let headTech = localStorage.getItem('asdp_head') || 'S. KARACAK';
let shiftStart = localStorage.getItem('asdp_shiftStart') || '11:45';
let shiftEnd = localStorage.getItem('asdp_shiftEnd') || '19:45';
let breakStart = localStorage.getItem('asdp_breakStart') || '';
let breakEnd = localStorage.getItem('asdp_breakEnd') || '';
let headBlocks = load('asdp_headBlocks', [{start: '', end: ''}]);

const tasksDiv = $('tasks'), techsDiv = $('techs'), headBlocksDiv = $('headBlocks'), resultsDiv = $('results');
const tasksStatDiv = $('tasksStat'), techsStatDiv = $('techsStat');
const mainContainer = $('container');

function renderTasks(){
  tasksDiv.innerHTML = '';
  tasks.forEach((t,i)=>{
    const row = document.createElement('div'); row.className = 'input-group';
    row.innerHTML = `
      <input type="text" data-i="${i}" data-field="name" value="${t.name}">
      <input type="number" step="0.25" min="0" data-i="${i}" data-field="hours" value="${t.hours}">
      <button class="btn-del" data-del="${i}">×</button>
    `;
    tasksDiv.appendChild(row);
  });
  save('asdp_tasks', tasks);
  updateTasksStat();
}

function renderTechs(){
  techsDiv.innerHTML = '';
  technicians.forEach((t,i)=>{
    const row = document.createElement('div'); row.className = 'input-group';
    row.innerHTML = `
      <input type="text" data-i="${i}" data-field="tech" value="${t}">
      <button class="btn-del" data-deltech="${i}">×</button>
    `;
    techsDiv.appendChild(row);
  });
  save('asdp_techs', technicians);
  updateTechsStat();
}

function renderHeadBlocks(){
  headBlocksDiv.innerHTML = '';
  headBlocks.forEach((b,i)=>{
    const row = document.createElement('div'); row.className = 'input-group';
    row.innerHTML = `
      <input type="time" data-i="${i}" data-field="headblock-start" value="${b.start}">
      <input type="time" data-i="${i}" data-field="headblock-end" value="${b.end}">
      <button class="btn-del" data-delheadblock="${i}" style="padding:8px 10px">×</button>
    `;
    headBlocksDiv.appendChild(row);
  });
  save('asdp_headBlocks', headBlocks);
}

function updateTasksStat(){
  const count = tasks.length;
  const total = tasks.reduce((s,t)=> s + (parseFloat(t.hours)||0), 0);
  tasksStatDiv.innerHTML = `Toplam İş: <strong>${count}</strong> – Toplam Süre (girdi): <strong>${total.toFixed(2)} saat</strong>`;
}

function updateTechsStat(){
  const count = technicians.length;
  const totalTaskHours = tasks.reduce((s,t)=> s + (parseFloat(t.hours)||0), 0);
  const avgPerTech = count>0 ? (totalTaskHours / count).toFixed(2) : '0.00';
  techsStatDiv.innerHTML = `Toplam Teknisyen: <strong>${count}</strong> – Ortalama Teknisyen başına Yük: <strong>${avgPerTech} saat</strong>`;
}

renderTasks(); renderTechs(); renderHeadBlocks();
$('headTech').value = headTech;
$('shiftStart').value = shiftStart;
$('shiftEnd').value = shiftEnd;
$('breakStart').value = breakStart;
$('breakEnd').value = breakEnd;

$('addTask').addEventListener('click', ()=>{ tasks.push({ name:`NRC ${tasks.length+1}`, hours:1.0 }); renderTasks(); });
$('addTech').addEventListener('click', ()=>{ technicians.push(`Teknisyen ${technicians.length+1}`); renderTechs(); });
$('resetTasks').addEventListener('click', ()=>{ if(confirm('Tüm işleri sıfırlamak?')){ tasks=[]; renderTasks(); }});
$('resetTechs').addEventListener('click', ()=>{ if(confirm('Tüm teknisyenleri sıfırlamak?')){ technicians=[]; renderTechs(); }});
$('clearBreak').addEventListener('click', ()=>{ $('breakStart').value=''; $('breakEnd').value=''; breakStart=''; breakEnd=''; localStorage.removeItem('asdp_breakStart'); localStorage.removeItem('asdp_breakEnd'); });
$('addHeadBlock').addEventListener('click', ()=>{ headBlocks.push({start:'', end:''}); renderHeadBlocks(); });

mainContainer.addEventListener('input', e => {
  const i = +e.target.dataset.i;
  const f = e.target.dataset.field;
  if (!Number.isFinite(i)) return;

  if (f === 'name') tasks[i].name = e.target.value;
  if (f === 'hours') tasks[i].hours = parseFloat(e.target.value) || 0;
  if (f === 'tech') technicians[i] = e.target.value;
  
  if (f === 'headblock-start') headBlocks[i].start = e.target.value;
  if (f === 'headblock-end') headBlocks[i].end = e.target.value;

  if (f === 'name' || f === 'hours') {
    save('asdp_tasks', tasks);
    updateTasksStat();
    updateTechsStat();
  }
  if (f === 'tech') {
    save('asdp_techs', technicians);
    updateTechsStat();
  }
  if (f === 'headblock-start' || f === 'headblock-end') {
    save('asdp_headBlocks', headBlocks);
  }
});

mainContainer.addEventListener('click', e => {
  const delTask = e.target.closest('[data-del]');
  if(delTask){ tasks.splice(+delTask.dataset.del,1); renderTasks(); return; }
  
  const delTech = e.target.closest('[data-deltech]');
  if(delTech){ technicians.splice(+delTech.dataset.deltech,1); renderTechs(); return; }
  
  const delHeadBlock = e.target.closest('[data-delheadblock]');
  if(delHeadBlock){
    if (headBlocks.length > 1) {
      headBlocks.splice(+delHeadBlock.dataset.delheadblock,1);
    } else {
      headBlocks = [{start:'', end:''}];
    }
    renderHeadBlocks();
    return;
  }
});

$('shiftStart').addEventListener('input', e=>{ shiftStart = e.target.value; localStorage.setItem('asdp_shiftStart', shiftStart); });
$('shiftEnd').addEventListener('input', e=>{ shiftEnd = e.target.value; localStorage.setItem('asdp_shiftEnd', shiftEnd); });
$('breakStart').addEventListener('input', e=>{ breakStart = e.target.value; localStorage.setItem('asdp_breakStart', breakStart); });
$('breakEnd').addEventListener('input', e=>{ breakEnd = e.target.value; localStorage.setItem('asdp_breakEnd', breakEnd); });
$('headTech').addEventListener('input', e=>{ headTech = e.target.value; localStorage.setItem('asdp_head', headTech); });

let _shiftS_real, _breakExists, _breakS_real, _breakE_real, _breakLen, _workEnd_offset;

function workToReal(workOffset){
  const real = _shiftS_real + workOffset;
  if(_breakExists && real >= _breakS_real) return real + _breakLen;
  return real;
}

function realToWork(realMin){
  if(realMin < _shiftS_real || realMin > _shiftS_real + _workEnd_offset + _breakLen) return null;
  if(_breakExists && realMin >= _breakS_real && realMin < _breakE_real) return null;
  
  if(_breakExists && realMin >= _breakE_real) {
    return realMin - _shiftS_real - _breakLen;
  }
  return realMin - _shiftS_real;
}

function tryScheduleOnTech(tech, duration, taskId, taskName){
  tech.segments.sort((a,b) => a.start - b.start);
  
  let searchStart = 0; 
  const firstSeg = tech.segments[0];
  let gapEnd = firstSeg ? firstSeg.start : _workEnd_offset;
  
  if ((gapEnd - searchStart) >= duration) {
    const s = searchStart;
    const e = s + duration;
    tech.segments.push({ start: s, end: e, taskId, taskName });
    tech.totalMin += duration;
    return { start: s, end: e };
  }
  
  for (let i = 0; i < tech.segments.length; i++) {
    searchStart = tech.segments[i].end; 
    gapEnd = (i + 1 < tech.segments.length) ? tech.segments[i+1].start : _workEnd_offset; 
    
    if ((gapEnd - searchStart) >= duration) {
      const s = searchStart;
      const e = s + duration;
      tech.segments.push({ start: s, end: e, taskId, taskName });
      tech.totalMin += duration;
      return { start: s, end: e };
    }
  }
  
  return null;
}

function mergeAndRecompute(techObjs) {
  techObjs.forEach((tech) => {
    tech.segments.sort((a,b)=>a.start - b.start);
    const merged = [];
    for(const s of tech.segments){
      if(merged.length === 0) merged.push(s);
      else {
        const last = merged[merged.length-1];
        if(last.taskId === s.taskId && last.end === s.start){
          last.end = s.end;
        } else {
          merged.push(s);
        }
      }
    }
    tech.segments = merged;
    tech.totalMin = tech.segments.reduce((sum,s) => sum + (s.end - s.start), 0);
  });
}

$('planBtn').addEventListener('click', ()=>{ 
  save('asdp_tasks', tasks); 
  save('asdp_techs', technicians); 
  localStorage.setItem('asdp_shiftStart',$('shiftStart').value||''); 
  localStorage.setItem('asdp_shiftEnd',$('shiftEnd').value||''); 
  localStorage.setItem('asdp_breakStart',$('breakStart').value||''); 
  localStorage.setItem('asdp_breakEnd',$('breakEnd').value||''); 
  localStorage.setItem('asdp_head',$('headTech').value||''); 
  save('asdp_headBlocks', headBlocks);
  plan(); 
});

function plan(){
  resultsDiv.innerHTML = '';

  if(!$('shiftStart').value || !$('shiftEnd').value){ resultsDiv.innerHTML = `<div class="warning">Vardiya başlangıç/bitiş saatlerini girin.</div>`; return; }
  if(technicians.length === 0){ resultsDiv.innerHTML = `<div class="warning">En az 1 teknisyen olmalı.</div>`; return; }

  _shiftS_real = t2m($('shiftStart').value);
  const shiftE_real = t2m($('shiftEnd').value);
  if(shiftE_real <= _shiftS_real){ resultsDiv.innerHTML = `<div class="warning">Vardiya bitiş saati başlangıçtan sonra olmalı.</div>`; return; }

  _breakExists = !!($('breakStart').value && $('breakEnd').value && t2m($('breakEnd').value) > t2m($('breakStart').value));
  _breakS_real = _breakExists ? t2m($('breakStart').value) : null;
  _breakE_real = _breakExists ? t2m($('breakEnd').value) : null;
  _breakLen = _breakExists ? (_breakE_real - _breakS_real) : 0;

  const workStart_offset = 0;
  _workEnd_offset = (shiftE_real - _shiftS_real) - _breakLen;
  if(_workEnd_offset <= 0) { resultsDiv.innerHTML = `<div class="warning">Vardiya çok kısa / mola çok uzun - plan yapılamıyor.</div>`; return; }

  const HEAD_MIN = 15;
  const techObjs = technicians.map(name => ({ name, segments:[], totalMin:0 }));
  
  let tasksCopy = tasks.map((t, idx) => {
    const inputHours = parseFloat(t.hours) || 0;
    const rawMin = Math.round(inputHours * 60);
    const headAlloc = Math.min(HEAD_MIN, rawMin);
    const techWorkMin = Math.max(0, rawMin - headAlloc);
    
    // ✅ DÜZELTİLDİ: 15'e yuvarlama yapma, orijinal süreyi koru
    // Sadece blok atarken 15'in katlarına böleceğiz
    
    return { 
      id: idx, 
      name: t.name, 
      inputHours: inputHours,
      rawMin: rawMin,
      headAlloc: headAlloc,
      techWorkMin: techWorkMin  // Yuvarlanmamış hali
    };
  });

  const taskSegments = new Map();
  const unallocated = [];
  const reducedTasks = [];

  tasksCopy.sort((a, b) => b.techWorkMin - a.techWorkMin);

  for(const task of tasksCopy){
    const techWork = task.techWorkMin;
    taskSegments.set(task.id, []);

    if(techWork === 0) continue;

    // ✅ DÜZELTİLDİ: İşi dağıtırken toplam süreyi aşmayacak şekilde yuvarlama
    let remainingWork = techWork;
    let totalAllocated = 0;  // Toplam atanan süreyi takip et
    
    while(remainingWork > 0) {
      const targetBlockSize = Math.max(30, Math.ceil(remainingWork / Math.max(1, technicians.length)));
      const currentBlock = Math.min(targetBlockSize, remainingWork);
      
      // ✅ Son blokta kalan süreyi aşmamak için kontrol
      let roundedBlock;
      if (remainingWork <= 15) {
        roundedBlock = remainingWork;  // Son küçük parça için yuvarlama yapma
      } else {
        roundedBlock = ceil15(currentBlock);
        // Eğer yuvarlanan değer kalan işten fazlaysa, kalan işi al
        if (roundedBlock > remainingWork) {
          roundedBlock = remainingWork;
        }
      }
      
      techObjs.sort((a, b) => a.totalMin - b.totalMin);
      
      let placed = false;
      for(let ti = 0; ti < techObjs.length; ti++){
        const tech = techObjs[ti];
        
        const attempt = tryScheduleOnTech(tech, roundedBlock, task.id, task.name);
        if(attempt){
          taskSegments.get(task.id).push({ techIndex: ti, start: attempt.start, end: attempt.end });
          remainingWork -= roundedBlock;
          totalAllocated += roundedBlock;
          placed = true;
          break;
        }
      }
      
      if(!placed) {
        // Daha küçük blokla dene, ama yine toplam süreyi aşma
        const smallerBlock = Math.min(ceil15(roundedBlock * 0.7), remainingWork);
        if(smallerBlock >= 15 || remainingWork < 15) {
          const tryBlock = remainingWork < 15 ? remainingWork : smallerBlock;
          for(let ti = 0; ti < techObjs.length; ti++){
            const tech = techObjs[ti];
            const attempt = tryScheduleOnTech(tech, tryBlock, task.id, task.name);
            if(attempt){
              taskSegments.get(task.id).push({ techIndex: ti, start: attempt.start, end: attempt.end });
              remainingWork -= tryBlock;
              totalAllocated += tryBlock;
              placed = true;
              if(tryBlock !== roundedBlock) {
                reducedTasks.push({
                  task: task.name,
                  original: roundedBlock,
                  reduced: tryBlock,
                  rate: (roundedBlock - tryBlock) / roundedBlock
                });
              }
              break;
            }
          }
        }
      }
      
      if(!placed) {
        unallocated.push({ task: task.name, minutes: roundedBlock, reason: 'Yer yok' });
        break;
      }
    }
  }

  mergeAndRecompute(techObjs);

  function getTotals(){ return techObjs.map((t,i)=>({ idx:i, total:t.totalMin })); }
  
  let totals = getTotals();
  let iter = 0;
  
  while(iter < 200){
    iter++;
    totals.sort((a,b)=>b.total - a.total);
    const maxTech = totals[0], minTech = totals[totals.length-1];
    
    if((maxTech.total - minTech.total) <= 30) break;
    
    const donor = techObjs[maxTech.idx];
    const receiver = techObjs[minTech.idx];
    
    let transferred = false;
    
    donor.segments.sort((a,b) => (a.end - a.start) - (b.end - b.start));
    
    for(let si = 0; si < donor.segments.length; si++){
      const seg = donor.segments[si];
      const segDuration = seg.end - seg.start;
      
      if(segDuration >= 45){
        const transferAmount = Math.min(60, Math.floor(segDuration / 2));
        
        const attempt = tryScheduleOnTech(receiver, transferAmount, seg.taskId, seg.taskName);
        if(attempt){
          if(segDuration === transferAmount){
            donor.segments.splice(si, 1);
          } else {
            seg.end -= transferAmount;
          }
          donor.totalMin -= transferAmount;
          
          const arr = taskSegments.get(seg.taskId) || [];
          arr.push({ techIndex: minTech.idx, start: attempt.start, end: attempt.end });
          taskSegments.set(seg.taskId, arr);
          
          transferred = true;
          break;
        }
      }
    }
    
    if(!transferred) break;
    
    mergeAndRecompute(techObjs);
    totals = getTotals();
  }

  mergeAndRecompute(techObjs);

  const taskFinalEnd = new Map();
  for(const task of tasksCopy){
    const arr = taskSegments.get(task.id) || [];
    const combined = arr.slice();
    techObjs.forEach((tech,ti)=> {
      tech.segments.forEach(s => {
        if(s.taskId === task.id && !combined.some(c => c.start===s.start && c.end===s.end && c.techIndex===ti)) {
          combined.push({ techIndex: ti, start: s.start, end: s.end });
        }
      });
    });
    if(combined.length === 0){ taskFinalEnd.set(task.id, null); continue; }
    const endMax = Math.max(...combined.map(s=>s.end));
    taskFinalEnd.set(task.id, endMax);
  }

  let headCursor = workStart_offset;
  const headAssignments = [];
  const headUnallocated = [];

  const headWorkBlocks = [];
  const headBlockInputs = load('asdp_headBlocks', []); 
  for (const block of headBlockInputs) {
    const s_real = t2m(block.start);
    const e_real = t2m(block.end);
    if (s_real === null || e_real === null || e_real <= s_real) continue;
    
    const s_work = realToWork(s_real);
    const e_work = realToWork(e_real);
    
    if (s_work !== null && e_work !== null && e_work > s_work) {
      headWorkBlocks.push({ start: s_work, end: e_work });
    } else if (s_work !== null && e_work === null) {
      headWorkBlocks.push({ start: s_work, end: _workEnd_offset });
    }
  }
  headWorkBlocks.sort((a,b) => a.start - b.start); 

  const tasksForHead = tasksCopy.slice().sort((a,b)=>{
    const A = taskFinalEnd.get(a.id), B = taskFinalEnd.get(b.id);
    if(A===null && B===null) return 0;
    if(A===null) return 1;
    if(B===null) return -1;
    return A - B;
  });

  for(const t of tasksForHead){
    const headNeeded = t.headAlloc;
    if(headNeeded <= 0) continue;
    
    let prefStart = Math.max(headCursor, (taskFinalEnd.get(t.id) !== null ? taskFinalEnd.get(t.id) - headNeeded : headCursor));
    if(prefStart < headCursor) prefStart = headCursor; 
    let prefEnd = prefStart + headNeeded;

    let adjusted = true;
    while(adjusted) {
      adjusted = false;
      for (const block of headWorkBlocks) {
        if (prefEnd > block.start && prefStart < block.end) { 
          prefStart = block.end; 
          prefEnd = prefStart + headNeeded;
          adjusted = true; 
          break; 
        }
      }
    }

    if(prefEnd > _workEnd_offset){
      headUnallocated.push({ task: t.name, minutes: headNeeded, reason: 'Vardiya Bitişi / Mola' });
      continue;
    }
    
    headAssignments.push({ taskId: t.id, taskName: t.name, start: prefStart, end: prefEnd });
    headCursor = prefEnd; 
  }

  const perTech = technicians.map(n => ({ name: n, segs: [], total: 0 }));
  techObjs.forEach((t, idx) => {
    t.segments.forEach(s => {
      if (s.taskId == null) return;
      const real = { startReal: workToReal(s.start), endReal: workToReal(s.end) };
      perTech[idx].segs.push({ task: tasks[s.taskId].name, start: real.startReal, end: real.endReal });
      let segmentDuration = real.endReal - real.startReal;
      if (_breakExists) {
        const segmentStart = real.startReal;
        const segmentEnd = real.endReal;
        const breakStart = _breakS_real;
        const breakEnd = _breakE_real;
        if (segmentStart < breakEnd && segmentEnd > breakStart) {
          const overlapStart = Math.max(segmentStart, breakStart);
          const overlapEnd = Math.min(segmentEnd, breakEnd);
          const overlapDuration = Math.max(0, overlapEnd - overlapStart);
          segmentDuration -= overlapDuration;
        }
      }
      perTech[idx].total += segmentDuration;
    });
  });

  let html = '';
  
  const totalInputHours = tasks.reduce((s,t)=>s + (parseFloat(t.hours)||0),0);
  html += `<div class="card"><div class="small">Toplam İş: <strong>${tasks.length}</strong> – Girdi Toplam Süre: <strong>${totalInputHours.toFixed(2)} saat</strong></div></div>`;
  
  let techHtml = `<div class="card"><h2>👷 Teknisyenlerin Programı</h2><table class="table"><tr><th>Teknisyen</th><th>İşler (zaman aralıkları)</th><th>Toplam (saat)</th></tr>`;
  perTech.forEach(p=>{
    p.segs.sort((a,b)=>a.start - b.start);
    const segText = p.segs.length ? p.segs.map(s=>`${s.task}: ${m2t(s.start)} - ${m2t(s.end)}`).join('<br>') : '<em>Atanmış iş yok</em>';
    techHtml += `<tr><td><strong>${p.name}</strong></td><td>${segText}</td><td><strong>${minutesToHoursStr(p.total)}</strong></td></tr>`;
  });
  techHtml += `</table></div>`;
  html += techHtml;

  const headHtml = headAssignments.length ? headAssignments.map(h=>`📌 <strong>${h.taskName}</strong> : ${m2t(workToReal(h.start))} - ${m2t(workToReal(h.end))}`).join('<br>') : '<div class="small">Başteknisyene atanmış görev yok veya atanamadı.</div>';
  html += `<div class="card"><h2>👑 B1 Teknisyen (${headTech})</h2>${headHtml}</div>`;

  if(headUnallocated.length > 0){
    const headUnallocatedByTask = {};
    headUnallocated.forEach(u => {
      if (!headUnallocatedByTask[u.task]) {
        headUnallocatedByTask[u.task] = { totalMinutes: 0, taskName: u.task };
      }
      headUnallocatedByTask[u.task].totalMinutes += u.minutes;
    });
    
    const headUnallocHtml = Object.values(headUnallocatedByTask).map(u => {
      const unallocHours = (u.totalMinutes / 60).toFixed(2).replace('.', ',');
      return `<div class="small">${u.taskName} – B1 için ${unallocHours} saat atanamadı (Vardiya bitişi/mola)</div>`;
    }).join('');
    html += `<div class="warning"><strong>⚠️ Atanamayan İşler (B1 Teknisyen)</strong><br>${headUnallocHtml}</div>`;
  }

  if (reducedTasks.length > 0) {
    const reducedHtml = reducedTasks.map(r => {
      if (r.reduced) {
        const origHrs = (r.original / 60).toFixed(2).replace('.', ',');
        const newHrs = (r.reduced / 60).toFixed(2).replace('.', ',');
        const diffHrs = (r.original/60 - r.reduced/60).toFixed(2).replace('.', ',');
        const pctText = r.rate ? ` (%${Math.round(r.rate * 100)} azaltma ile planlandı)` : '';
        return `<div class="small">${r.task} – ${origHrs} ⇒ ${newHrs} saat (${diffHrs} saat arttı)${pctText}</div>`;
      } else {
        return `<div class="small">${r.task} – Azaltma denemeleri başarısız oldu.</div>`;
      }
    }).join('');
    html += `<div class="note" style="border-left-color:#f59e0b;color:#f97316"><strong>⚙️ Süresi Düşürülen İşler</strong><br>${reducedHtml}</div>`;
  }

  html += `<div class="footer-warning">⚠️ Bu planlama bir öneridir. Gerçek durumlarda İşyeri prosedürlerine ve operasyonel ihtiyaçlara göre değişiklik yapılabilir.</div>`;
  resultsDiv.innerHTML = html;
}

</script>
</body>
</html>
